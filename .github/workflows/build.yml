name: Build Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mac:
        description: 'Builda anche il Mac DMG?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  # ── WINDOWS — gira ad ogni push su master ─────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bundled-mcp
        run: |
          git clone https://github.com/tradesdontlie/tradingview-mcp bundled-mcp
          cd bundled-mcp
          npm install

      - name: Install dependencies
        run: npm install

      - name: Build Windows .exe
        run: npm run dist-win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/*.exe

  # ── MAC — gira SOLO se triggerato manualmente con build_mac=true ──────────
  build-mac:
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_mac == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download bundled Node + npm completo
        run: |
          mkdir -p bundled-node
          curl -L https://nodejs.org/dist/v20.19.1/node-v20.19.1-darwin-arm64.tar.gz -o /tmp/node-arm64.tar.gz
          tar -xzf /tmp/node-arm64.tar.gz -C /tmp
          cp /tmp/node-v20.19.1-darwin-arm64/bin/node bundled-node/node-arm64
          chmod +x bundled-node/node-arm64
          curl -L https://nodejs.org/dist/v20.19.1/node-v20.19.1-darwin-x64.tar.gz -o /tmp/node-x64.tar.gz
          tar -xzf /tmp/node-x64.tar.gz -C /tmp
          cp /tmp/node-v20.19.1-darwin-x64/bin/node bundled-node/node-x64
          chmod +x bundled-node/node-x64
          cp -r /tmp/node-v20.19.1-darwin-arm64/lib/node_modules/npm bundled-node/npm_modules
          ls -la bundled-node/

      - name: Setup bundled-mcp
        run: |
          git clone https://github.com/tradesdontlie/tradingview-mcp bundled-mcp
          cd bundled-mcp && npm install

      - name: Install dependencies
        run: npm install

      - name: Build Mac .dmg
        run: npm run dist-mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: installer-mac
          path: dist/*.dmg
