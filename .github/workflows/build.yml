name: Build Windows EXE

on:
  push:
    branches: [ main, master, v2-port ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bundled-mcp (clona + patch webview + npm install)
        shell: pwsh
        run: |
          # La cartella esiste (con .gitkeep) per soddisfare extraResources;
          # serve svuotarla prima del clone.
          if (Test-Path bundled-mcp) { Remove-Item -Recurse -Force bundled-mcp }
          git clone --depth 1 https://github.com/LewisWJackson/tradingview-mcp-jackson bundled-mcp
          # Il TradingView incorporato via <webview> in Electron è di tipo
          # 'webview' nei target CDP. Il pattern "t.type === 'page'" appare in
          # più file MCP (connection.js, core/tab.js, ...). Patchiamo TUTTI i
          # .js sotto src/ per essere robusti a modifiche future upstream.
          $files = Get-ChildItem -Recurse -Path "bundled-mcp/src" -Filter *.js
          $patchedCount = 0
          foreach ($f in $files) {
            $content = Get-Content $f.FullName -Raw
            if ($content -match "t\.type === 'page'") {
              $new = $content -replace "t\.type === 'page'", "(t.type === 'page' || t.type === 'webview')"
              Set-Content -NoNewline -Path $f.FullName -Value $new
              $patchedCount++
              Write-Host "Patched: $($f.FullName)"
            }
          }
          Write-Host "File MCP patchati: $patchedCount"
          if ($patchedCount -lt 2) {
            Write-Error "Patch incompleta: atteso almeno 2 file, trovati $patchedCount"
            exit 1
          }
          Push-Location bundled-mcp
          npm install --no-audit --no-fund
          Pop-Location
          # Rimuove .git per evitare path lunghi / permessi sui pack
          Remove-Item -Recurse -Force bundled-mcp/.git

      - name: Setup bundled-node (Node.js portable Windows x64)
        shell: pwsh
        run: |
          $ver = "v22.11.0"
          $url = "https://nodejs.org/dist/$ver/node-$ver-win-x64.zip"
          $zip = "$env:TEMP\node-win.zip"
          # Pulizia: la cartella ha solo .gitkeep, serve vuota per Expand-Archive
          if (Test-Path bundled-node) { Remove-Item -Recurse -Force bundled-node }
          New-Item -ItemType Directory -Force -Path bundled-node | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath bundled-node -Force
          Rename-Item -Path "bundled-node/node-$ver-win-x64" -NewName "node-win-x64"
          if (-not (Test-Path "bundled-node/node-win-x64/node.exe")) {
            throw "node.exe non trovato dopo l'estrazione"
          }

      - name: Genera icona .ico da .png
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/icon.ico")) {
            Add-Type -AssemblyName System.Drawing
            $src = Resolve-Path "assets/icon.png"
            $png = [System.Drawing.Image]::FromFile($src.Path)
            # Bitmap quadrato 256x256 per qualità decente
            $bmp = New-Object System.Drawing.Bitmap 256, 256
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
            $g.DrawImage($png, 0, 0, 256, 256)
            $g.Dispose()
            $icon = [System.Drawing.Icon]::FromHandle($bmp.GetHicon())
            $fs = [System.IO.File]::Create("$PWD\assets\icon.ico")
            $icon.Save($fs)
            $fs.Close()
            $bmp.Dispose()
            $png.Dispose()
            Write-Host "icon.ico generata"
          } else {
            Write-Host "icon.ico già presente — salto"
          }

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Windows EXE (NSIS)
        run: npm run dist-win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/*.exe
