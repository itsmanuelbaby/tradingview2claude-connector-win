name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bundled-mcp
        run: |
          git clone https://github.com/LewisWJackson/tradingview-mcp-jackson bundled-mcp
          cd bundled-mcp
          npm install

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE
        run: npm run dist-win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/*.exe
